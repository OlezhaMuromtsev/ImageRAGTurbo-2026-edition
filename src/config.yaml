trainer:
  alpha: 2.5
  beta: 1.0
  epochs: 10
  lr: 0.001
  student_steps: [0.25, 0.5, 0.75, 0.99]
  alphas: [1, 1, 1, 1] # незаполненные поля вообще должны быть по идее определены в scheduler для teacher, если мы его из модуля diffusers берем
  sigmas: [1, 1, 1, 1]  # незаполненные поля вообще должны быть по идее определены в scheduler для teacher, если мы его из модуля diffusers берем
  teacher_steps: [0.25, 0.5, 0.75, 0.99]  # незаполненные поля вообще должны быть по идее определены в scheduler для teacher, если мы его из модуля diffusers берем
  latent_size: 64
  db_path: "data/vector_db"